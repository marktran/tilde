## Treat the Shure MV7+ as a microphone only.
##
## The MV7+ exposes a USB playback sink for its headphone monitor jack, which
## makes PipeWire/WirePlumber eligible to auto-route desktop audio to the mic.
## Disable only that playback node; the mono capture source remains available.

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.usb-Shure_Inc_Shure_MV7__.*"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
