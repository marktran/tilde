# Default Chromecast target name used by catt.
# Leave empty to cast to the default/last-used device.
device=SONY XR-65A95L

# Full path to catt binary used by the script.
catt_bin=/usr/bin/catt

# Keybinding for cast action (set empty to disable script keybind).
bind_key=c
bind_key_forced=yes

# Run cast command asynchronously so mpv does not block.
async=yes

# Ruby helpers used by the Lua wrapper.
cast_script=/home/mark/.config/mpv/bin/chromecast-cast
control_script=/home/mark/.config/mpv/bin/chromecast-control

# Start Chromecast playback from the current mpv time position.
# Uses whole seconds via catt -t.
seek_current=yes
min_seek_seconds=1

# Automatically enter cast control mode after cast starts.
# In cast control mode, SPACE controls TV play/pause and keeps local paused.
control_mode_auto=yes
control_toggle_key=C
control_playpause_key=SPACE
control_keys_forced=yes

# Use the default Chromecast receiver app.
# This improves compatibility when a custom app path fails.
force_default=yes

# Avoid automatic sidecar subtitle loading during cast.
# This prevents subtitle-related startup issues on some devices.
no_subs=yes

# Optional local playback behavior after a successful cast.
# Default is pause local so audio/video does not play on both laptop and TV.
pause_local=yes
stop_local=no
quit_local=no
