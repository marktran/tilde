# OSC layout style (compact floating panel with title + controls).
layout=slimbox

# Scale OSC up slightly in both windowed and fullscreen modes.
scalewindowed=2
scalefullscreen=2

# Keep OSC size consistent instead of scaling with video size.
vidscale=no

# Hide seekable range/chapter hover decorations for a cleaner seekbar.
seekrangestyle=none
chapter_fmt=no

# Do not show window manager buttons in OSC.
windowcontrols=no

# Disable wheel actions on OSC elements.
scrollcontrols=no

# Auto-hide timing and fade behavior (milliseconds).
hidetimeout=800
fadeduration=200
fadein=no

# Show OSC on mouse movement, then auto-hide.
visibility=auto

# Show remaining time instead of total time.
timetotal=no
