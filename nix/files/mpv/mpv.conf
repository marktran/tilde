# Resume files when reopening them.
resume-playback=yes

# Save position on normal quit so q also resumes later.
save-position-on-quit=yes

# When opening one local file, auto-build a playlist from sibling video files.
autocreate-playlist=filter
directory-filter-types=video

# Start with no default keybindings; define everything in input.conf.
no-input-default-bindings

# Minimal UI
osc=yes
osd-level=1
osd-font=IBM Plex Sans
osd-font-size=28
osd-on-seek=msg
osd-align-y=top
osd-bar-align-y=1
osd-playing-msg=${media-title}
osd-playing-msg-duration=1800
cursor-autohide=no
