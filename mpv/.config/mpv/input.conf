# Disable mouse wheel volume changes.
WHEEL_UP ignore
WHEEL_DOWN ignore

# Toggle playlist overlay on/off.
F8 script-message playlist-toggle

# Toggle info/stats overlay on/off with lowercase i.
i script-binding stats/display-stats-toggle

# Fullscreen toggle for Hypr PiP setup.
f run /home/mark/.config/mpv/bin/hypr-mpv-fullscreen-toggle
F run /home/mark/.config/mpv/bin/hypr-mpv-fullscreen-toggle
F11 run /home/mark/.config/mpv/bin/hypr-mpv-fullscreen-toggle
ESC set fullscreen no

# PiP size presets for Hyprland mpv window.
0 run /home/mark/.config/hypr/scripts/hypr-mpv-pip-size half
1 run /home/mark/.config/hypr/scripts/hypr-mpv-pip-size normal
2 run /home/mark/.config/hypr/scripts/hypr-mpv-pip-size double
