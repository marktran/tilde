# Let userspace own the ThinkPad F8/Mode key.
#
# On the X1 Carbon Gen 13, thinkpad_acpi handles Fn+F8 internally as a
# platform-profile cycle key before Hyprland/wev can see it. Disabling the
# driver's platform-profile integration keeps the HKEY event available to acpid
# while preventing the kernel from changing power profiles on key press.
options thinkpad_acpi profile_force=-1
