# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, E, Emacs, exec, omarchy-launch-or-focus "^emacs$" "uwsm-app -- emacs"
bindd = SUPER SHIFT ALT, E, Emacs (Writing), exec, env EMACS_WRITING_MODE=1 emacs
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, $terminal -e btop
bindd = SUPER SHIFT, D, Docker, exec, $terminal -e lazydocker
bindd = SUPER SHIFT, S, Signal, exec, omarchy-launch-or-focus signal "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-or-focus-webapp chrome-chatgpt "https://chatgpt.com"
bindd = SUPER SHIFT, R, Reflect, exec, omarchy-launch-or-focus-webapp chrome-reflect "https://reflect.app"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-or-focus-webapp X "https://x.com/"

# Custom
# Omarchy binds the ThinkPad Copilot key as SUPER+SHIFT+code:201.
# Makima remaps that hardware chord to Right Control; if Makima is stopped,
# keep the key from falling through to the Omarchy menu.
unbind = SUPER SHIFT, code:201
bindd = , XF86Tools, Lock Screen, exec, omarchy-lock-screen

# Use ThinkPad F4/mic-mute key for Voxtype instead of hardware mic mute.
# Omarchy defaults bind this key to `omarchy-cmd-mic-mute` and Voxtype to
# Super+Ctrl+X, so remove both defaults before adding the hardware binding.
unbind = , XF86AudioMicMute
unbind = SUPER CTRL, X
bindd = , XF86AudioMicMute, Toggle dictation, exec, voxtype record toggle

# Reorder tabs/windows within a Hyprland group.
bindd = SUPER CTRL SHIFT, LEFT, Move grouped window left, movegroupwindow, b
bindd = SUPER CTRL SHIFT, RIGHT, Move grouped window right, movegroupwindow, f

# HHKB
device {
  name = pfu-limited-hhkb-hybrid
  bind = RALT, F4, exec, /usr/bin/playerctl previous
  bind = RALT, F5, exec, /usr/bin/playerctl play-pause
  bind = RALT, F6, exec, /usr/bin/playerctl next
}

# Current external keyboard: Topre REALFORCE 87 US
# Device identifier from `hyprctl devices`: XF86Launch6 is emitted by the
# topre-realforce-87-us-1 interface (not -keyboard, which is where F13 came from).
# XF86Launch6 is mapped to the same color-scheme toggle as the ThinkPad Mode key.
binddk = , XF86Launch6, topre-realforce-87-us-1, Toggle color scheme, exec, /home/mark/bin/toggle-color-scheme

# Toggle dictation on F4 (Voxtype), scoped to the Topre keyboard.
# Keys on this board are emitted by the topre-realforce-87-us-1 interface
# (same as XF86Launch6), not -keyboard. Mirrors the SUPER CTRL X toggle.
binddk = , F4, topre-realforce-87-us-1, Toggle dictation, exec, voxtype record toggle

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
